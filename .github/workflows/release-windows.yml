name: Release Build for Windows 11 amd64
run-name: ${{ github.ref_name }} Release Build for Windows 11

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build_windows-2025:
    runs-on: windows-2025
    permissions: write-all
    environment: Release

    steps:
    - name: Configure Git line endings
      run: git config --global core.autocrlf input

    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@c25f41106918cde0bf347e6f201277392b3a9e9d
      with:
        vulkan-query-version: 1.3.204.0
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true

    - name: Setup llvm-mingw toolchain
      shell: pwsh
      run: |
        # Pinned to llvm-mingw 20231128 (LLVM/clang 17.0.6) to match the
        # toolchain bundled with Qt Creator. Bump deliberately, not silently.
        curl -L -o llvm-mingw.zip "https://github.com/mstorsjo/llvm-mingw/releases/download/20231128/llvm-mingw-20231128-ucrt-x86_64.zip"
        Expand-Archive llvm-mingw.zip -DestinationPath .
        $extracted = Get-ChildItem -Directory -Filter "llvm-mingw-*" | Select-Object -First 1
        Rename-Item $extracted.FullName "llvm-mingw"
        echo "$env:GITHUB_WORKSPACE\llvm-mingw\bin" >> $env:GITHUB_PATH

    - name: Ensure Ninja is available
      shell: pwsh
      run: |
        if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
          choco install ninja -y
        }

    - name: Fetch Qt
      shell: pwsh
      run: |
        curl -L -o qt611.zip "https://github.com/JS8Call-improved/js8lib/releases/download/lib%2F4.0/qt-6.11.1-windows-x64.zip"
        Expand-Archive qt611.zip -DestinationPath qt611
        echo "$env:GITHUB_WORKSPACE\qt611\bin" >> $env:GITHUB_PATH

    - name: Fetch js8lib
      shell: pwsh
      run: |
        curl -L -o js8lib.zip "https://github.com/JS8Call-improved/js8lib/releases/download/lib%2F4.0/js8lib4.0_Win64.zip"
        Expand-Archive js8lib.zip -DestinationPath .

    - name: Setup build directory
      shell: pwsh
      run: mkdir build

    - name: Configure JS8Call
      shell: pwsh
      run: |
        cd build
        $env:Path = "$env:GITHUB_WORKSPACE\js8lib\bin;$env:Path"
        $workspace = $env:GITHUB_WORKSPACE
        cmake -G "Ninja" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_C_COMPILER=x86_64-w64-mingw32-clang `
          -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-clang++ `
          -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres `
          -DQt6_DIR="$workspace/qt611/lib/cmake/Qt6" `
          -DCMAKE_PREFIX_PATH="$workspace/qt611;$workspace/js8lib/boost-1.88;$workspace/js8lib/hamlib-4.7.1;$workspace/js8lib/fftw3;$workspace/js8lib/libusb-1.0.29" ..

    - name: Extract version
      shell: pwsh
      run: |
        $ver     = (Get-Content build/CMakeCache.txt | Select-String "CMAKE_PROJECT_VERSION:STATIC=(.+)").Matches[0].Groups[1].Value.Trim()
        $gitHash = (git rev-parse --short HEAD).Trim()

        if ($ver -eq "0.0.0") {
          $safeVer = $gitHash
        } else {
          $safeVer = $ver
        }

        echo "JS8_SAFE_VER=$safeVer" >> $env:GITHUB_ENV

    - name: Build JS8Call
      shell: pwsh
      run: |
        cd build
        cmake --build . --config Release

    - name: Move exe and libraries to install directory
      shell: pwsh
      run: |
        cd build
        $exePath = if (Test-Path "Release\JS8Call.exe") { "Release\JS8Call.exe" } else { "JS8Call.exe" }
        cp $exePath JS8Call\
        cp $env:GITHUB_WORKSPACE\js8lib\dll\*.dll JS8Call\
        cp $env:GITHUB_WORKSPACE\LICENSE JS8Call\

        # js8lib's libc++.dll / libunwind.dll came from Qt 6.9.3's bundled toolchain,
        # not the llvm-mingw build used to compile JS8Call here.
        $mingwRuntimeDir = "$env:GITHUB_WORKSPACE\llvm-mingw\x86_64-w64-mingw32\bin"
        foreach ($dll in @("libc++.dll", "libunwind.dll")) {
          $src = Join-Path $mingwRuntimeDir $dll
          if (Test-Path $src) {
            cp $src JS8Call\ -Force
          } else {
            Write-Warning "Expected llvm runtime DLL not found: $src"
          }
        }

    - name: Get signing certificate
      shell: pwsh
      run: |
        echo "${{ secrets.RELEASE_CODE_SIGNING_PFX_BASE64 }}" > 'D:/a/JS8Call-improved/cert.base64'
        certutil -decode 'D:/a/JS8Call-improved/cert.base64' 'D:/a/JS8Call-improved/certificate.pfx'

    - name: Sign binaries
      shell: pwsh
      env:
        PFX_CERTIFICATE_PASSWORD: ${{ secrets.RELEASE_PFX_CERTIFICATE_PASSWORD }}
      run: |
        $signtool = 'C:/Program Files (x86)/Windows Kits/10/bin/10.0.26100.0/x64/signtool.exe'
        $cert     = 'D:/a/JS8Call-improved/certificate.pfx'
        cd ./build/JS8Call/
        & $signtool sign /fd SHA256 /v /f $cert /p "$env:PFX_CERTIFICATE_PASSWORD" *.exe
        & $signtool sign /fd SHA256 /v /f $cert /p "$env:PFX_CERTIFICATE_PASSWORD" *.dll

    - name: INNO Setup
      shell: pwsh
      run: |
        $safeVer = "${{ env.JS8_SAFE_VER }}"
        Write-Host "SAFE_VER=$safeVer"
        $issArg = "/DMyAppVersion=$safeVer"
        Write-Host "ISS Arg: $issArg"
        cd ./build/
        & 'C:/Program Files (x86)/Inno Setup 6/ISCC.exe' $issArg "/FJS8Call-$safeVer-installer" ../.github/workflows/scripts/ci-windows-installer.iss

    - name: Sign installer
      shell: pwsh
      env:
        PFX_CERTIFICATE_PASSWORD: ${{ secrets.RELEASE_PFX_CERTIFICATE_PASSWORD }}
      run: |
        $signtool = 'C:/Program Files (x86)/Windows Kits/10/bin/10.0.26100.0/x64/signtool.exe'
        $cert     = 'D:/a/JS8Call-improved/certificate.pfx'
        cd ./build/JS8Call/
        & $signtool sign /fd SHA256 /v /f $cert /p "$env:PFX_CERTIFICATE_PASSWORD" JS8Call-*-installer.exe

    - name: Attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: '${{ github.workspace }}/build/JS8Call/*'

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: "JS8Call-${{ env.JS8_SAFE_VER }}-installer"
        path: ./build/JS8Call/JS8Call-*-installer.exe
        archive: false
